<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>on&on 시설 현황</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f1f5f9;color:#111;min-height:100vh;}
.header{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;padding:24px 32px;}
.header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.header p{font-size:13px;opacity:.75;margin-top:4px;}
.tabs{display:flex;gap:8px;padding:20px 32px 0;flex-wrap:wrap;}
.tab{padding:9px 20px;border-radius:8px 8px 0 0;border:none;cursor:pointer;font-size:14px;font-weight:600;background:#e2e8f0;color:#64748b;transition:all .15s;}
.tab.active{background:#fff;color:#1e3a8a;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.tab:hover:not(.active){background:#cbd5e1;color:#334155;}
.content{background:#fff;margin:0 32px;border-radius:0 12px 12px 12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.summary{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.stat{flex:1;min-width:120px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;}
.stat-label{font-size:12px;color:#64748b;margin-bottom:4px;}
.stat-value{font-size:24px;font-weight:700;color:#1e3a8a;}
.stat-unit{font-size:12px;color:#94a3b8;margin-left:2px;}
.section-title{font-size:14px;font-weight:700;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.chart-wrap{height:320px;margin-bottom:32px;}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-bar select{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;color:#374151;cursor:pointer;}
.filter-bar input{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;flex:1;min-width:140px;}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#2563eb;}
.clear-btn{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;background:#f8fafc;cursor:pointer;color:#64748b;}
.clear-btn:hover{background:#e2e8f0;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;color:#374151;border-bottom:2px solid #e2e8f0;cursor:pointer;white-space:nowrap;}
th:hover{background:#eef2f7;}
th .sort-icon{font-size:10px;color:#94a3b8;margin-left:4px;}
td{padding:9px 14px;border-bottom:1px solid #f1f5f9;color:#374151;}
tr:hover td{background:#f8fafc;}
.sido-cell{font-weight:600;color:#1e3a8a;}
.count-cell{font-weight:700;text-align:right;}
.bar-inline{display:inline-block;height:8px;background:#bfdbfe;border-radius:4px;margin-left:8px;vertical-align:middle;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:4px;}
.badge-1{background:#dbeafe;color:#1d4ed8;}
.badge-2{background:#dcfce7;color:#15803d;}
.badge-3{background:#fef3c7;color:#b45309;}
.no-data{text-align:center;padding:40px;color:#94a3b8;font-size:14px;}
@media(max-width:600px){
  .header{padding:16px;}
  .tabs{padding:16px 16px 0;}
  .content{margin:0 16px;padding:16px;}
  .chart-wrap{height:220px;}
}
</style>
</head>
<body>
<div class="header">
  <h1>on&on 시설 현황 대시보드</h1>
  <p>걸음마윈 · 걸음마프로재단 · 하나은행 — 전국 시설 분포 현황</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('all')">전체</button>
  <button class="tab" onclick="setTab('걸음마윈')">걸음마윈</button>
  <button class="tab" onclick="setTab('통합문서걸음마프로재단')">걸음마프로재단</button>
  <button class="tab" onclick="setTab('하나은행')">하나은행</button>
</div>

<div class="content">
  <div class="summary" id="summary"></div>
  <div class="section-title">📊 시도별 시설 수</div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="filter-bar">
    <select id="sido-filter" onchange="renderTable()">
      <option value="">전체 시도</option>
    </select>
    <input id="search" placeholder="시군구 검색..." oninput="renderTable()">
    <button class="clear-btn" onclick="clearFilters()">초기화</button>
    <span id="row-count" style="font-size:12px;color:#94a3b8;"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('sido')">시도 <span class="sort-icon" id="sort-sido">↕</span></th>
        <th onclick="sortBy('sigungu')">시군구 <span class="sort-icon" id="sort-sigungu">↕</span></th>
        <th onclick="sortBy('count')" style="text-align:right">시설 수 <span class="sort-icon" id="sort-count">↕</span></th>
        <th>분포</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

const COLORS = {
  '걸음마윈': '#2563eb',
  '통합문서걸음마프로재단': '#16a34a',
  '하나은행': '#d97706',
};
const LABELS = {
  '걸음마윈': '걸음마윈',
  '통합문서걸음마프로재단': '걸음마프로재단',
  '하나은행': '하나은행',
};

let currentTab = 'all';
let sortCol = 'count';
let sortDir = -1;
let chartInst = null;

function getData() {
  if (currentTab === 'all') {
    const merged = {};
    Object.entries(RAW).forEach(([inst, rows]) => {
      rows.forEach(r => {
        const key = r.sido + '|' + r.sigungu;
        if (!merged[key]) merged[key] = {sido: r.sido, sigungu: r.sigungu, count: 0, sources: []};
        merged[key].count += r.count;
        merged[key].sources.push({inst, count: r.count});
      });
    });
    return Object.values(merged);
  }
  return RAW[currentTab].map(r => ({...r, sources: [{inst: currentTab, count: r.count}]}));
}

function getSidoData() {
  const data = getData();
  const map = {};
  data.forEach(r => {
    map[r.sido] = (map[r.sido] || 0) + r.count;
  });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', [
      'all','걸음마윈','통합문서걸음마프로재단','하나은행'
    ][i] === tab);
  });
  clearFilters();
  renderSummary();
  renderChart();
  renderTable();
}

function renderSummary() {
  const data = getData();
  const total = data.reduce((s,r) => s+r.count, 0);
  const sidos = new Set(data.map(r=>r.sido)).size;
  const sigungus = data.length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">총 시설 수</div><div class="stat-value">${total.toLocaleString()}<span class="stat-unit">개</span></div></div>
    <div class="stat"><div class="stat-label">분포 시도</div><div class="stat-value">${sidos}<span class="stat-unit">개</span></div></div>
    <div class="stat"><div class="stat-label">분포 시군구</div><div class="stat-value">${sigungus}<span class="stat-unit">곳</span></div></div>
  `;
}

function renderChart() {
  const sidoData = getSidoData();
  const labels = sidoData.map(([s]) => s.replace('특별자치도','').replace('특별자치시','').replace('특별시','').replace('광역시','').replace('도','').replace('시',''));
  const values = sidoData.map(([,v]) => v);

  let color;
  if (currentTab === 'all') {
    color = '#2563eb';
  } else {
    color = COLORS[currentTab];
  }

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: color + '99',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderTable() {
  let data = getData();
  const sidoFilter = document.getElementById('sido-filter').value;
  const search = document.getElementById('search').value.trim();

  if (sidoFilter) data = data.filter(r => r.sido === sidoFilter);
  if (search) data = data.filter(r => r.sigungu.includes(search) || r.sido.includes(search));

  data.sort((a,b) => {
    const av = sortCol === 'count' ? a.count : (sortCol === 'sido' ? a.sido : a.sigungu);
    const bv = sortCol === 'count' ? b.count : (sortCol === 'sido' ? b.sido : b.sigungu);
    return typeof av === 'number' ? (av-bv)*sortDir : av.localeCompare(bv)*sortDir;
  });

  const max = Math.max(...data.map(r=>r.count), 1);
  document.getElementById('row-count').textContent = `${data.length}개 시군구`;

  // 시도 셀렉트 옵션 (최초 1회)
  if (!document.getElementById('sido-filter').dataset.init) {
    const sidos = [...new Set(getData().map(r=>r.sido))].sort();
    document.getElementById('sido-filter').innerHTML =
      '<option value="">전체 시도</option>' +
      sidos.map(s=>`<option value="${s}"${s===sidoFilter?' selected':''}>${s}</option>`).join('');
    document.getElementById('sido-filter').dataset.init = '1';
  }

  const tbody = document.getElementById('table-body');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="no-data">해당하는 데이터가 없습니다.</td></tr>`;
    return;
  }

  let prevSido = null;
  tbody.innerHTML = data.map(r => {
    const sidoCell = r.sido !== prevSido
      ? `<td class="sido-cell">${r.sido}</td>`
      : `<td style="color:#94a3b8;font-size:12px;">↳</td>`;
    prevSido = r.sido;
    const barW = Math.round((r.count / max) * 80);
    const srcBadges = r.sources.map(s =>
      `<span class="badge badge-${Object.keys(RAW).indexOf(s.inst)+1}">${LABELS[s.inst]} ${s.count}</span>`
    ).join('');
    return `<tr>
      ${sidoCell}
      <td>${r.sigungu}</td>
      <td class="count-cell">${r.count.toLocaleString()}</td>
      <td>${currentTab==='all' ? srcBadges : `<span class="bar-inline" style="width:${barW}px"></span>`}</td>
    </tr>`;
  }).join('');
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'count' ? -1 : 1; }
  ['sido','sigungu','count'].forEach(c => {
    document.getElementById('sort-'+c).textContent =
      c === sortCol ? (sortDir === 1 ? '↑' : '↓') : '↕';
  });
  // 시도 셀렉트 재초기화 허용
  document.getElementById('sido-filter').dataset.init = '';
  renderTable();
}

function clearFilters() {
  document.getElementById('sido-filter').value = '';
  document.getElementById('sido-filter').dataset.init = '';
  document.getElementById('search').value = '';
  renderTable();
}

// init
renderSummary();
renderChart();
renderTable();
</script>
