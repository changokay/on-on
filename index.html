<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>on&on 시설 현황</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f1f5f9;color:#111;min-height:100vh;}
.header{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;padding:24px 32px;}
.header h1{font-size:22px;font-weight:700;}
.header p{font-size:13px;opacity:.75;margin-top:4px;}
.tabs{display:flex;gap:8px;padding:20px 32px 0;flex-wrap:wrap;}
.tab{padding:9px 20px;border-radius:8px 8px 0 0;border:none;cursor:pointer;font-size:14px;font-weight:600;background:#e2e8f0;color:#64748b;transition:all .15s;}
.tab.active{background:#fff;color:#1e3a8a;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.tab:hover:not(.active){background:#cbd5e1;}
.content{background:#fff;margin:0 32px;border-radius:0 12px 12px 12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.summary{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.stat{flex:1;min-width:120px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;}
.stat-label{font-size:12px;color:#64748b;margin-bottom:4px;}
.stat-value{font-size:24px;font-weight:700;color:#1e3a8a;}
.stat-unit{font-size:12px;color:#94a3b8;margin-left:2px;}

/* 지도+차트 나란히 */
.viz-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.viz-box{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;}
.viz-label{font-size:12px;font-weight:700;color:#64748b;padding:10px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
#map{height:320px;}
.chart-inner{height:320px;padding:12px;}

/* 지도 범례 */
.legend{background:#fff;padding:8px 12px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.15);line-height:1.8;font-size:11px;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-color{width:14px;height:14px;border-radius:2px;flex-shrink:0;}

.section-title{font-size:14px;font-weight:700;color:#374151;margin-bottom:14px;}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;color:#374151;}
.filter-bar input{flex:1;min-width:140px;}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:#2563eb;}
.clear-btn{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;background:#f8fafc;cursor:pointer;color:#64748b;}
.clear-btn:hover{background:#e2e8f0;}
.active-filter{font-size:12px;color:#2563eb;background:#eff6ff;padding:4px 10px;border-radius:20px;cursor:pointer;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;color:#374151;border-bottom:2px solid #e2e8f0;cursor:pointer;white-space:nowrap;}
th:hover{background:#eef2f7;}
th .si{font-size:10px;color:#94a3b8;margin-left:4px;}
td{padding:9px 14px;border-bottom:1px solid #f1f5f9;color:#374151;}
tr:hover td{background:#f8fafc;}
.sido-cell{font-weight:600;color:#1e3a8a;}
.count-cell{font-weight:700;text-align:right;}
.bar-inline{display:inline-block;height:8px;background:#bfdbfe;border-radius:4px;margin-left:8px;vertical-align:middle;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:4px;}
.badge-1{background:#dbeafe;color:#1d4ed8;}
.badge-2{background:#dcfce7;color:#15803d;}
.badge-3{background:#fef3c7;color:#b45309;}
.no-data{text-align:center;padding:40px;color:#94a3b8;font-size:14px;}

@media(max-width:700px){
  .header{padding:16px;}
  .tabs{padding:16px 16px 0;}
  .content{margin:0 16px;padding:16px;}
  .viz-row{grid-template-columns:1fr;}
  #map{height:260px;}
  .chart-inner{height:220px;}
}
</style>
</head>
<body>

<div class="header">
  <h1>on&on 시설 현황 대시보드</h1>
  <p>걸음마윈 · 걸음마프로재단 · 하나은행 — 전국 시설 분포 현황</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('all')">전체</button>
  <button class="tab" onclick="setTab('걸음마윈')">걸음마윈</button>
  <button class="tab" onclick="setTab('통합문서걸음마프로재단')">걸음마프로재단</button>
  <button class="tab" onclick="setTab('하나은행')">하나은행</button>
</div>

<div class="content">
  <div class="summary" id="summary"></div>

  <div class="viz-row">
    <div class="viz-box">
      <div class="viz-label">🗺 지역별 분포 지도 <span style="font-weight:400;font-size:11px">(시도 클릭 → 필터)</span></div>
      <div id="map"></div>
    </div>
    <div class="viz-box">
      <div class="viz-label">📊 시도별 시설 수</div>
      <div class="chart-inner"><canvas id="chart"></canvas></div>
    </div>
  </div>

  <div class="section-title">목록</div>
  <div class="filter-bar">
    <select id="sido-filter" onchange="onSidoFilter()">
      <option value="">전체 시도</option>
    </select>
    <input id="search" placeholder="시군구 검색..." oninput="renderTable()">
    <button class="clear-btn" onclick="clearFilters()">초기화</button>
    <span id="row-count" style="font-size:12px;color:#94a3b8;"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('sido')">시도<span class="si" id="s-sido">↕</span></th>
        <th onclick="sortBy('sigungu')">시군구<span class="si" id="s-sigungu">↕</span></th>
        <th onclick="sortBy('count')" style="text-align:right">시설 수<span class="si" id="s-count">↓</span></th>
        <th>비고</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

"sido":"충청북도","sigungu":"청주시 흥덕구","count":44}]};

const LABELS = {'걸음마윈':'걸음마윈','통합문서걸음마프로재단':'걸음마프로재단','하나은행':'하나은행'};
const COLORS = {'걸음마윈':'#2563eb','통합문서걸음마프로재단':'#16a34a','하나은행':'#d97706'};

let currentTab = 'all', sortCol = 'count', sortDir = -1;
let chartInst = null, map, geoLayer, geoData;

// GeoJSON 시도명 → 우리 데이터 시도명 매핑
const SIDO_MAP = {
  '강원도':'강원특별자치도',
  '전라북도':'전북특별자치도',
  '세종시':'세종특별자치시',
  '제주도':'제주특별자치도',
};

function getData() {
  if (currentTab === 'all') {
    const m = {};
    Object.entries(RAW).forEach(([inst, rows]) => {
      rows.forEach(r => {
        const k = r.sido+'|'+r.sigungu;
        if (!m[k]) m[k] = {sido:r.sido, sigungu:r.sigungu, count:0, sources:[]};
        m[k].count += r.count;
        m[k].sources.push({inst, count:r.count});
      });
    });
    return Object.values(m);
  }
  return RAW[currentTab].map(r => ({...r, sources:[{inst:currentTab, count:r.count}]}));
}

function getSidoTotals() {
  const m = {};
  getData().forEach(r => { m[r.sido] = (m[r.sido]||0) + r.count; });
  return m;
}

// ─── 지도 ───
async function initMap() {
  map = L.map('map', {zoomControl:true, scrollWheelZoom:false, attributionControl:false})
    .setView([36.5, 127.8], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {maxZoom:18}).addTo(map);

  const res = await fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2012/json/provinces-geo-simple.json');
  geoData = await res.json();

  // 범례
  const legend = L.control({position:'bottomright'});
  legend.onAdd = () => {
    const d = L.DomUtil.create('div','legend');
    d.innerHTML = `
      <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:6px;">시설 수</div>
      ${[[0,'#f0f9ff'],[1,'#bae6fd'],[100,'#38bdf8'],[500,'#0284c7'],[1000,'#0c4a6e']].map(([v,c])=>
        `<div class="legend-item"><div class="legend-color" style="background:${c}"></div>${v}+</div>`
      ).join('')}`;
    return d;
  };
  legend.addTo(map);

  renderMap();
}

function getColor(count, max) {
  if (!count) return '#f8fafc';
  const t = Math.log(count+1) / Math.log(max+1);
  const stops = [[248,250,252],[186,230,253],[56,189,248],[2,132,199],[12,74,110]];
  const i = Math.min(Math.floor(t*4), 3);
  const f = (t*4) - i;
  const [r1,g1,b1] = stops[i], [r2,g2,b2] = stops[i+1];
  return `rgb(${Math.round(r1+(r2-r1)*f)},${Math.round(g1+(g2-g1)*f)},${Math.round(b1+(b2-b1)*f)})`;
}

function renderMap() {
  if (!geoData) return;
  const totals = getSidoTotals();
  const max = Math.max(...Object.values(totals), 1);
  const activeSido = document.getElementById('sido-filter').value;

  if (geoLayer) geoLayer.remove();
  geoLayer = L.geoJSON(geoData, {
    style: feat => {
      const gname = feat.properties.name || '';
      const sido = SIDO_MAP[gname] || gname;
      const count = totals[sido] || 0;
      const isActive = activeSido && activeSido === sido;
      return {
        fillColor: getColor(count, max),
        fillOpacity: 0.85,
        weight: isActive ? 3 : 1,
        color: isActive ? '#f59e0b' : '#fff',
      };
    },
    onEachFeature: (feat, layer) => {
      const gname = feat.properties.name || '';
      const sido = SIDO_MAP[gname] || gname;
      const count = totals[sido] || 0;
      layer.bindTooltip(
        `<strong>${gname}</strong><br>시설 ${count.toLocaleString()}개`,
        {sticky:true, className:''}
      );
      layer.on({
        mouseover(e){ e.target.setStyle({weight:2, color:'#94a3b8'}); },
        mouseout(e){ geoLayer.resetStyle(e.target); },
        click() {
          const sel = document.getElementById('sido-filter');
          if (sel.value === sido) {
            sel.value = '';
          } else {
            sel.value = sido;
          }
          onSidoFilter();
        }
      });
    }
  }).addTo(map);
}

// ─── 요약 ───
function renderSummary() {
  const data = getData();
  const total = data.reduce((s,r)=>s+r.count,0);
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">총 시설 수</div><div class="stat-value">${total.toLocaleString()}<span class="stat-unit">개</span></div></div>
    <div class="stat"><div class="stat-label">분포 시도</div><div class="stat-value">${new Set(data.map(r=>r.sido)).size}<span class="stat-unit">개</span></div></div>
    <div class="stat"><div class="stat-label">분포 시군구</div><div class="stat-value">${data.length}<span class="stat-unit">곳</span></div></div>
  `;
}

// ─── 차트 ───
function renderChart() {
  const totals = getSidoTotals();
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(([s])=>s.replace('특별자치도','').replace('특별자치시','').replace('특별시','').replace('광역시','').replace(/도$/,''));
  const values = sorted.map(([,v])=>v);
  const color = currentTab==='all' ? '#2563eb' : COLORS[currentTab];

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart'), {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:color+'99', borderColor:color, borderWidth:1, borderRadius:4 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true, grid:{color:'#f1f5f9'}},
        x:{grid:{display:false}, ticks:{font:{size:11}}}
      }
    }
  });
}

// ─── 테이블 ───
function renderTable() {
  let data = getData();
  const sido = document.getElementById('sido-filter').value;
  const q = document.getElementById('search').value.trim();
  if (sido) data = data.filter(r=>r.sido===sido);
  if (q) data = data.filter(r=>r.sigungu.includes(q)||r.sido.includes(q));

  data.sort((a,b)=>{
    const av = sortCol==='count'?a.count:(a[sortCol]||'');
    const bv = sortCol==='count'?b.count:(b[sortCol]||'');
    return typeof av==='number'?(av-bv)*sortDir:av.localeCompare(bv)*sortDir;
  });

  const max = Math.max(...data.map(r=>r.count),1);
  document.getElementById('row-count').textContent = data.length+'개 시군구';

  let prev = null;
  document.getElementById('tbody').innerHTML = data.length ? data.map(r=>{
    const sc = r.sido!==prev ? `<td class="sido-cell">${r.sido}</td>` : `<td style="color:#cbd5e1;font-size:11px">↳</td>`;
    prev = r.sido;
    const bar = `<span class="bar-inline" style="width:${Math.round(r.count/max*70)}px"></span>`;
    const badges = r.sources.map(s=>`<span class="badge badge-${Object.keys(RAW).indexOf(s.inst)+1}">${LABELS[s.inst]} ${s.count}</span>`).join('');
    return `<tr>${sc}<td>${r.sigungu}</td><td class="count-cell">${r.count.toLocaleString()}</td><td>${currentTab==='all'?badges:bar}</td></tr>`;
  }).join('') : `<tr><td colspan="4" class="no-data">해당 데이터 없음</td></tr>`;

  // 시도 select 초기화 (탭 변경 시)
  const sel = document.getElementById('sido-filter');
  if (!sel.dataset.tab || sel.dataset.tab !== currentTab) {
    const sidos = [...new Set(getData().map(r=>r.sido))].sort();
    const cur = sel.value;
    sel.innerHTML = '<option value="">전체 시도</option>' + sidos.map(s=>`<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
    sel.dataset.tab = currentTab;
  }
}

function onSidoFilter() {
  renderTable();
  renderMap();
}

function sortBy(col) {
  sortDir = sortCol===col ? sortDir*-1 : (col==='count'?-1:1);
  sortCol = col;
  ['sido','sigungu','count'].forEach(c=>{
    document.getElementById('s-'+c).textContent = c===sortCol?(sortDir===1?'↑':'↓'):'↕';
  });
  renderTable();
}

function clearFilters() {
  document.getElementById('sido-filter').value = '';
  document.getElementById('search').value = '';
  renderTable();
  renderMap();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active', ['all','걸음마윈','통합문서걸음마프로재단','하나은행'][i]===tab);
  });
  document.getElementById('sido-filter').dataset.tab = '';
  clearFilters();
  renderSummary();
  renderChart();
  renderMap();
}

// init
renderSummary();
renderChart();
renderTable();
initMap();
</script>
